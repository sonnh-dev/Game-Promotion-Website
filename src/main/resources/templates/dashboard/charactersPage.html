<!doctype html>
<html lang="vi" class="h-full" xmlns="http://www.w3.org/1999/html" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Nhân vật</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&amp;display=swap"
          rel="stylesheet">
    <link rel="stylesheet" href="/CSS/Dashboard/Dashboard.css">
    <style>
        body { box-sizing: border-box; }
    </style>
</head>
<body class="h-full overflow-hidden">
<div id="app-root" class="flex h-full w-full" style="background: #0a0e1a;">
    <aside id="sidebar" class="flex-shrink-0 flex flex-col h-full overflow-y-auto"
           style="width: 240px; background: #0d1224; border-right: 1px solid rgba(255,255,255,0.06);">
        <div class="p-5 pb-3">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center"
                     style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                    <i data-lucide="zap" style="width:18px;height:18px;color:#fff;"></i>
                </div>
                <span class="text-white font-bold text-base tracking-tight">Vortex</span>
            </div>
            <p class="text-xs font-semibold uppercase tracking-widest mb-3" style="color: rgba(255,255,255,0.3);">
                Menu</p>
        </div>
        <nav class="flex-1 px-3 space-y-1">
            <a class="sidebar-item flex items-center gap-3" href="/dashboard">
                <i data-lucide="layout-dashboard" style="width:18px;height:18px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-sm" style="color:rgba(255,255,255,0.5);">Dashboard</span>
            </a>
            <a class="sidebar-item flex items-center gap-3" href="/dashboard/news">
                <i data-lucide="newspaper" style="width:18px;height:18px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-sm" style="color:rgba(255,255,255,0.5);">Tin tức</span>
            </a>
            <a class="sidebar-item active flex items-center gap-3" href="/dashboard/characters">
                <i data-lucide="users" style="width:18px;height:18px;color:#818cf8;"></i>
                <span class="text-sm font-medium text-white">Nhân vật</span>
            </a>
            <a class="sidebar-item flex items-center gap-3" href="/dashboard/rankings">
                <i data-lucide="trophy" style="width:18px;height:18px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-sm" style="color:rgba(255,255,255,0.5);">Bảng xếp hạng</span>
            </a>
            <a class="sidebar-item flex items-center gap-3" href="/dashboard/media">
                <i data-lucide="image" style="width:18px;height:18px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-sm" style="color:rgba(255,255,255,0.5);">Banner / Video</span>
            </a>
            <a class="sidebar-item flex items-center gap-3" href="/dashboard/theme">
                <i data-lucide="palette" style="width:18px;height:18px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-sm" style="color:rgba(255,255,255,0.5);">Giao diện</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 h-full overflow-y-auto overflow-x-hidden p-6 lg:p-8" style="scrollbar-gutter: stable;">
        <header class="flex items-center justify-between mb-8 animate-in" style="animation-delay: 0.05s;">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Nhân vật</h1>
                <p class="text-sm mt-1" style="color:rgba(255,255,255,0.4);">Quản lý nhân vật hiển thị trên website</p>
            </div>
            <div class="flex items-center gap-2 px-4 py-2 rounded-xl"
                 style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);">
                <i data-lucide="user" style="width:15px;height:15px;color:rgba(255,255,255,0.4);"></i>
                <span class="text-xs font-medium" style="color:rgba(255,255,255,0.5);"
                      th:text="${userName}">admin</span>
            </div>
        </header>

        <section class="rounded-2xl p-6 animate-in"
                 style="background: #111827; border: 1px solid rgba(255,255,255,0.06); animation-delay: 0.15s;">
            <div class="flex items-center justify-between gap-4 flex-wrap">
                <div>
                    <h2 class="text-sm font-semibold text-white">Danh sách nhân vật</h2>
                    <p class="text-xs mt-1" style="color:rgba(255,255,255,0.35);">Trang này đã có route, phần CRUD bạn có thể làm tiếp.</p>
                </div>
                <button class="tab-btn" style="background: #6366f1; color:#fff;">
                    <span class="inline-flex items-center gap-2">
                        <i data-lucide="plus" style="width:14px;height:14px;"></i>
                        Thêm nhân vật
                    </span>
                </button>
            </div>
            <div class="mt-6 text-sm" style="color:rgba(255,255,255,0.5);">
                Chưa có dữ liệu để hiển thị.
            </div>
        </section>
    </main>
</div>

<script>
    if (window.lucide) window.lucide.createIcons();
</script>
</body>
</html>
