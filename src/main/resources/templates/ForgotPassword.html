<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Quên mật khẩu</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>

<body>
<div class="d-flex justify-content-center">
    <div class="card shadow-sm border-0 p-4 m-5" style="max-width: 500px; width: 100%;">
        <div class="text-center mb-4">
            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                 style="width: 50px; height: 50px;">
                <i class="fas fa-key fa-lg"></i>
            </div>
            <h5 class="mt-3 mb-1">Quên mật khẩu?</h5>
            <small class="text-muted">Vui lòng nhập email để nhận liên kết đặt lại mật khẩu.</small>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/forgotPassword}" method="post" class="needs-validation" novalidate>
            <div class="form-floating mb-3">
                <div class="input-group">
                    <span class="input-group-text" id="email-addon">
                         <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="Nhập gmail của bạn tại đây" aria-label="Email" aria-describedby="email-addon"
                           required>
                    <div class="invalid-feedback">Vui lòng nhập email hợp lệ.</div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-paper-plane me-1"></i> Gửi liên kết
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" class="text-decoration-none text-primary">
                <i class="fas fa-arrow-left me-1"></i> Quay lại đăng nhập
            </a>
        </div>
    </div>
</div>
</body>
</html>
