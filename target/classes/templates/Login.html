<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>

<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg border-0"
         style="width: 100%; max-width: 420px; background-color: rgba(255, 255, 255, 0.95); border-radius: 12px;">
        <div class="card-header bg-transparent border-0 text-center pt-4">
            <h4 class="mt-3 mb-0">Đăng nhập tài khoản</h4>
<!--            <small class="text-muted">-->
<!--                Chưa có tài khoản?-->
<!--               <a th:href="@{/register}" class="text-blue fw-semibold text-decoration-none">Đăng ký ngay</a>-->
<!--            </small>-->
        </div>

        <div class="card-body px-4">
            <!-- Thông báo lỗi -->
            <div th:if="${param.error}" class="alert alert-danger text-center">
                Username hoặc mật khẩu không đúng!
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">UserName</label>
                    <input id="userName" type="text" class="form-control" name="username"
                           placeholder="Nhập username" required/>
                </div>
                <div class="mb-2">
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <input id="password" type="password" class="form-control" name="password"
                           placeholder="********" required/>
                </div>

                <div class="mb-3 text-end">
                    <a th:href="@{/forgotPassword}" class="text-decoration-none small text-secondary">Quên mật khẩu?</a>
                </div>

                <div class="d-grid text-center">
                    <button type="submit" class="btn btn-info fw-semibold">Đăng nhập</button>
                </div>
            </form>
        </div>

        <div class="card-footer text-center bg-transparent border-0 py-3">
            <small class="text-muted"></small>
        </div>
    </div>
</div>
</body>
</html>
